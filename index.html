<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STEP Question Database</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hidden" id="splash-screen">
  <canvas id="chaos-canvas"></canvas>
</div>

<div id="main-screen" class="layout">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <h2 id="easteregg">STEP Questions</h2>

    <input
      type="text"
      id="search"
      placeholder="Search (e.g. 21 S2 Q5)"
    >

    <ul id="questionList"></ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <div id="viewer">
      <p class="placeholder">
        Select a question from the list.
      </p>
    </div>
  </main>

  <header class="topbar">
  <header class="topbar">
    <div class="topbar-right">
      <button id="theme-toggle" title="Toggle dark mode">🌞</button>

      <div class="auth-area">
        <div id="auth-buttons">
          <button id="login-btn">Log in</button>
          <button id="signup-btn">Sign up</button>
        </div>

        <div id="user-menu" class="hidden">
          <button id="profile-btn" class="profile-circle">👤</button>
          <div id="profile-dropdown" class="dropdown-menu hidden">
            <button id="open-dashboard" class="dropdown-item">Dashboard</button>
            <button id="logout-btn" class="dropdown-item danger">Log out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- LOGIN POPUP -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Log in</h3>
      <input id="login-email" type="email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button id="login-submit">Log in</button>
      <button class="close-modal">Cancel</button>
    </div>
  </div>

  <!-- SIGNUP POPUP -->
  <div id="signup-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Sign up</h3>
      <input id="signup-email" type="email" placeholder="Email">
      <input id="signup-password" type="password" placeholder="Password">
      <button id="signup-submit">Create account</button>
      <button class="close-modal">Cancel</button>
    </div>
  </div>
  </header>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="hidden">

  <div class="dashboard-layout">

    <div class="dashboard-header">
      <h1>Your Progress</h1>
      <button id="close-dashboard">Back to Questions</button>
    </div>

    <div class="dashboard-grid">
      <div id="stat-attempted" class="dashboard-card"></div>
      <div id="stat-completed" class="dashboard-card"></div>
      <div id="stat-avg-time" class="dashboard-card"></div>
      <div id="stat-avg-difficulty" class="dashboard-card"></div>
    </div>

    <div class="dashboard-grid" style="grid-template-columns:1fr 1fr;">
      <div class="dashboard-section">
        <h3>Time (min) per attempt</h3>
        <canvas id="timeChart"></canvas>
      </div>
      <div class="dashboard-section">
        <h3>Difficulty per attempt</h3>
        <canvas id="difficultyChart"></canvas>
      </div>
    </div>

    <div class="dashboard-section">
      <h3>Activity Map</h3>
      <div id="heatmap"></div>
    </div>

    <div class="dashboard-split">
      <div>
        <h2>Priority Review</h2>
        <ul id="priorityList"></ul>
      </div>

      <div>
        <h2>Recent Activity</h2>
        <div id="recentList"></div>
      </div>
    </div>

  </div>

</div>

<!-- Notifications -->
<div id="notifications"></div>

<script type="module" src="./js/splash.js"></script>
<script type="module" src="./js/main.js"></script>
<script type="module" src="./js/dashboard/dashboard.js"></script>
</html>
